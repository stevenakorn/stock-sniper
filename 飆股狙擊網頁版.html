<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飆股狙擊系統 v12.5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root {
  --bg:#050a12; --bg2:#0a1525; --bg3:#0d1e35;
  --border:#1a3a5c; --cyan:#00e5ff; --cyan2:#00b8d4;
  --green:#00e676; --red:#ff1744; --amber:#ffab00;
  --purple:#7c4dff; --text:#c8d8e8; --text2:#7a9ab5;
  --mono:'Share Tech Mono',monospace; --sans:'Noto Sans TC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.015) 2px,rgba(0,229,255,.015) 4px);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);box-shadow:0 0 20px var(--cyan);z-index:100}
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:16px}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin-bottom:16px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cyan);box-shadow:0 0 12px var(--cyan)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:38px;height:38px;border:1px solid var(--cyan);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 12px rgba(0,229,255,.3);animation:pulse-border 2s ease-in-out infinite}
@keyframes pulse-border{0%,100%{box-shadow:0 0 8px rgba(0,229,255,.3)}50%{box-shadow:0 0 20px rgba(0,229,255,.6)}}
.logo-text h1{font-size:17px;font-weight:700;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,.5)}
.logo-text p{font-size:10px;color:var(--text2);font-family:var(--mono);letter-spacing:2px}
.header-right{display:flex;align-items:center;gap:16px}
.clock{font-family:var(--mono);font-size:20px;color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,.4);letter-spacing:2px}
.market-badge{padding:3px 10px;border-radius:2px;font-size:11px;font-family:var(--mono);letter-spacing:1px;border:1px solid}
.market-badge.open{color:var(--green);border-color:var(--green);background:rgba(0,230,118,.08);animation:blink 1.5s ease-in-out infinite}
.market-badge.closed{color:var(--text2);border-color:var(--border)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:14px 18px;position:relative;overflow:hidden;transition:border-color .3s}
.stat-card:hover{border-color:var(--cyan2)}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent,var(--cyan)),transparent)}
.stat-label{font-size:10px;color:var(--text2);letter-spacing:2px;margin-bottom:6px;font-family:var(--mono)}
.stat-value{font-size:26px;font-weight:700;font-family:var(--mono);color:var(--accent,var(--cyan));text-shadow:0 0 10px rgba(0,229,255,.3)}
.stat-sub{font-size:10px;color:var(--text2);margin-top:3px;font-family:var(--mono)}
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:14px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.panel-header{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.panel-title{font-size:11px;font-family:var(--mono);letter-spacing:2px;color:var(--cyan)}
.panel-badge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:2px;background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.3)}
.filter-bar{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg3);flex-wrap:wrap}
.filter-btn{padding:4px 12px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .2s;letter-spacing:1px}
.filter-btn:hover{border-color:var(--cyan2);color:var(--cyan)}
.filter-btn.active{background:rgba(0,229,255,.1);border-color:var(--cyan);color:var(--cyan)}
.hits-container{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:280px;max-height:calc(100vh - 340px);overflow-y:auto}
.right-col{display:flex;flex-direction:column;gap:14px}
.scan-status{padding:14px;display:flex;flex-direction:column;gap:10px}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
.status-key{color:var(--text2);font-family:var(--mono);letter-spacing:1px}
.status-val{color:var(--text);font-family:var(--mono)}
.scan-bar-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:2px}
.scan-bar{height:100%;background:linear-gradient(90deg,var(--cyan2),var(--cyan));border-radius:2px;transition:width .5s ease;width:0%}
.btn-row{display:flex;gap:8px;padding:0 14px 14px}
.btn{flex:1;padding:7px;border-radius:3px;border:1px solid;cursor:pointer;font-size:10px;font-family:var(--mono);letter-spacing:1px;transition:all .2s;background:transparent}
.btn-scan{color:var(--cyan);border-color:var(--cyan)}
.btn-scan:hover{background:rgba(0,229,255,.1)}
.btn-clear{color:var(--text2);border-color:var(--border)}
.log-container{padding:10px;font-family:var(--mono);font-size:10px;display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto}
.log-entry{color:var(--text2);line-height:1.5}
.log-entry.hit{color:var(--green)}
.log-entry.warn{color:var(--amber)}
.statusbar{margin-top:14px;padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:10px;color:var(--text2)}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}
.radar-section{margin-bottom:16px}
.radar-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.radar-list{padding:12px;display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto}
.industry-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:3px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.industry-row:hover{background:rgba(0,229,255,.05);border-color:var(--border)}
.flow-chart{padding:12px;display:flex;flex-direction:column;gap:5px}
.flow-row{display:flex;align-items:center;gap:8px}
.flow-label{font-size:10px;font-family:var(--mono);color:var(--text2);min-width:70px}
.flow-bar-wrap{flex:1;height:16px;background:var(--bg3);border-radius:2px;overflow:hidden;position:relative}
.flow-bar{height:100%;border-radius:2px;transition:width .6s;display:flex;align-items:center;padding-left:6px}
.flow-bar.up{background:linear-gradient(90deg,rgba(0,230,118,.3),rgba(0,230,118,.6))}
.flow-bar.down{background:linear-gradient(90deg,rgba(255,23,68,.3),rgba(255,23,68,.6))}
.scan-panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:14px 18px;margin-bottom:16px}
.scan-panel-title{font-size:11px;font-family:var(--mono);color:var(--cyan);letter-spacing:2px;margin-bottom:12px}
.scan-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.scan-select{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:7px 12px;color:var(--text);font-family:var(--mono);font-size:12px;cursor:pointer;min-width:200px}
.btn-start-scan{padding:7px 20px;border-radius:3px;border:1px solid var(--cyan);color:var(--cyan);background:rgba(0,229,255,.05);font-size:11px;font-family:var(--mono);cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <div class="logo-text"><h1>飆股狙擊系統</h1><p>STOCK SNIPER SYSTEM v12.5</p></div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="market-badge closed" id="marketBadge">盤後</div>
    </div>
  </header>

  <div class="scan-panel">
    <div class="scan-panel-title">◈ 盤後分析設定</div>
    <div class="scan-controls">
      <select class="scan-select" id="industrySelect">
        <option value="ALL">🌐 全部產業</option>
        <option value="半導體">半導體</option>
        <option value="電腦硬體">電腦硬體</option>
        <option value="金融保險">金融保險</option>
        <option value="電子零組件">電子零組件</option>
        <option value="鋼鐵">鋼鐵</option>
        <option value="航運">航運</option>
        <option value="生技醫療">生技醫療</option>
      </select>
      <select class="scan-select" id="marketType">
        <option value="all">上市+上櫃</option>
        <option value="TSE">僅上市</option>
        <option value="OTC">僅上櫃</option>
      </select>
      <button class="btn-start-scan" id="btnScan" onclick="runCustomScan()">▶ 開始掃描</button>
    </div>
  </div>

  <div class="main-grid">
    <div class="panel">
        <div class="panel-header">◈ SIGNAL MONITOR</div>
        <div id="hitsContainer" class="hits-container"></div>
    </div>
    <div class="right-col">
      <div class="panel">
        <div class="panel-header">◈ SCAN LOG</div>
        <div class="log-container" id="logContainer"></div>
      </div>
    </div>
  </div>
</div>

<script>
// 1. Token 鎖死並隱藏
const token = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoic3RldmVuMDMyMyIsImVtYWlsIjoic3RldmVuYWtvcm5AZ21haWwuY29tIiwidG9rZW5fdmVyc2lvbiI6Mn0.skA0AbGBSnuH4aji-E7NQPKDNd-G31K7g_sq772bg5w";
const INDUSTRY_MAP = {
  "半導體": ["2330","2454"], "電腦硬體": ["2317","2382"], "金融保險": ["2881","2882"],
  "電子零組件": ["2327","2392"], "鋼鐵": ["2002","2006"], "航運": ["2603","2609"], "生技醫療": ["4147","4746"]
};
let STOCK_LIST = []; let stockNameMap = {};

// 2. 篩選邏輯
async function runCustomScan() {
    const industry = document.getElementById("industrySelect").value;
    const market = document.getElementById("marketType").value;
    let pool = (industry === "ALL") ? Object.keys(stockNameMap) : (INDUSTRY_MAP[industry] || []);
    STOCK_LIST = pool.filter(id => {
        if (market === 'TSE') return id.startsWith('1') || id.startsWith('2');
        if (market === 'OTC') return id.startsWith('3') || id.startsWith('5') || id.startsWith('6');
        return true;
    });
    addLog(`篩選：${industry} / ${market}，掃描 ${STOCK_LIST.length} 檔`);
    startScan();
}

// 3. 過濾雜訊 (放在原本的 renderMoneyFlowData 函式開頭)
function renderMoneyFlowData(data) {
    data.forEach(d => {
        const id = d.Code || d.stock_id || "";
        if (!id || !/^\d{4}$/.test(id)) return; // 徹底踢除法人統計雜訊
        // ... 原本的渲染邏輯 ...
    });
}

// 4. 預載資料庫 (確保搜尋有數字)
async function fetchTopStocks() {
  try {
    const res = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo&token=${token}`);
    const json = await res.json();
    json.data.forEach(item => { if (/^\d{4}$/.test(item.stock_id)) stockNameMap[item.stock_id] = item.stock_name; });
    addLog("✅ 數據庫已同步");
  } catch(e) { addLog("❌ 同步失敗"); }
}

function addLog(msg) { document.getElementById("logContainer").innerHTML += `<div class="log-entry">${msg}</div>`; }

// [將你原本 v12.5 的 startScan, analyzeChip, renderHits, exportReport 等核心函數放在此處下方]
// (為了篇幅我這裡省略，請將原檔案剩下的內容接在這裡)

(async function init() {
  await fetchTopStocks();
})();
</script>
</body>
</html>
